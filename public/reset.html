<!DOCTYPE html>
<html>
<head>
    <title>Reset Welcome Card</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0a0400;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .reset-box {
            background: linear-gradient(135deg, rgba(20, 15, 40, 0.9), rgba(30, 25, 60, 0.85));
            border: 2px solid rgba(245, 166, 35, 0.3);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin: 0 0 20px 0;
            color: #ffd87a;
        }
        p {
            color: rgba(255, 240, 200, 0.9);
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .button {
            background: linear-gradient(110deg, #fff8d7, #ffd87a, #f5a623, #e05a47);
            color: #1a0800;
            border: none;
            padding: 15px 30px;
            border-radius: 999px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 100, 50, 0.4);
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 100, 50, 0.6);
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #a39389;
        }
    </style>
</head>
<body>
    <div class="reset-box">
        <h1>🍷 RolêPOA</h1>
        <p>Resetando o Welcome Card...</p>
        <button class="button" onclick="reset()">Resetar e Começar</button>
        <div class="status" id="status">Clique no botão acima</div>
    </div>

    <script>
        function reset() {
            // Remove all welcome flags
            localStorage.removeItem('role_poa_welcomed');
            sessionStorage.clear();

            // Log for verification
            console.log('✅ Welcome card resetado!');
            console.log('role_poa_welcomed:', localStorage.getItem('role_poa_welcomed'));

            // Show status
            document.getElementById('status').textContent = '✅ Resetado! Redirecionando...';
            document.querySelector('.button').disabled = true;

            // Redirect after 1 second
            setTimeout(() => {
                window.location.href = '/';
            }, 1000);
        }

        // Auto-reset on page load
        window.addEventListener('load', () => {
            console.log('Reset page loaded');
            console.log('Current localStorage:', localStorage.getItem('role_poa_welcomed'));
        });
    </script>
</body>
</html>
