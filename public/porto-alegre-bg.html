<!DOCTYPE html>
<html>
<head>
    <title>Porto Alegre Sunset</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(to bottom,
                #1a0a3e 0%,
                #2d1b4e 15%,
                #5a2d3e 30%,
                #d97706 45%,
                #f59e0b 60%,
                #92bffd 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, sans-serif;
        }

        svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .sun {
            animation: sunGlow 4s ease-in-out infinite;
        }

        @keyframes sunGlow {
            0%, 100% { filter: drop-shadow(0 0 60px rgba(255, 200, 0, 0.8)); }
            50% { filter: drop-shadow(0 0 100px rgba(255, 100, 50, 1)); }
        }

        .river {
            animation: riverShimmer 3s ease-in-out infinite;
        }

        @keyframes riverShimmer {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.9; }
        }

        .gasometer {
            animation: gasoGlow 3s ease-in-out infinite;
        }

        @keyframes gasoGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 150, 0, 0.6)); }
            50% { filter: drop-shadow(0 0 40px rgba(255, 100, 50, 0.8)); }
        }

        .lacador {
            animation: lacadorGlow 3.5s ease-in-out infinite;
        }

        @keyframes lacadorGlow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(255, 200, 0, 0.5)); }
            50% { filter: drop-shadow(0 0 30px rgba(255, 150, 0, 0.7)); }
        }

        .stars {
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .card {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(20, 10, 40, 0.85);
            border: 2px solid rgba(255, 200, 0, 0.3);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: rgba(255, 240, 200, 0.9);
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
        <!-- Gradiente background -->
        <defs>
            <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#1a0a3e;stop-opacity:1" />
                <stop offset="20%" style="stop-color:#5a2d4e;stop-opacity:1" />
                <stop offset="40%" style="stop-color:#d97706;stop-opacity:1" />
                <stop offset="60%" style="stop-color:#f59e0b;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#92bffd;stop-opacity:1" />
            </linearGradient>

            <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" style="stop-color:#ffeb3b;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#ff9800;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#ff5722;stop-opacity:0.8" />
            </radialGradient>
        </defs>

        <!-- Sky -->
        <rect width="1600" height="1000" fill="url(#skyGradient)" />

        <!-- Sun -->
        <circle cx="800" cy="350" r="120" fill="url(#sunGradient)" class="sun" />

        <!-- River/Water -->
        <ellipse cx="800" cy="750" rx="700" ry="150" fill="rgba(100, 150, 200, 0.5)" class="river" />
        <ellipse cx="800" cy="760" rx="650" ry="100" fill="rgba(200, 150, 100, 0.4)" />

        <!-- Gasometer (left) -->
        <g class="gasometer">
            <!-- Base -->
            <rect x="300" y="500" width="150" height="250" fill="#333" opacity="0.8" />
            <!-- Cilindro -->
            <circle cx="375" cy="550" r="90" fill="#444" opacity="0.8" />
            <!-- Detalhe -->
            <rect x="320" y="520" width="110" height="20" fill="#666" opacity="0.7" />
            <rect x="320" y="560" width="110" height="20" fill="#666" opacity="0.7" />
            <!-- Lights -->
            <circle cx="375" cy="500" r="8" fill="#ffb700" opacity="0.9" />
            <circle cx="375" cy="620" r="8" fill="#ff8800" opacity="0.8" />
        </g>

        <!-- Lacador Monument (right hilltop) -->
        <g class="lacador">
            <!-- Pedestal -->
            <polygon points="1200,600 1150,750 1250,750" fill="#8b7355" opacity="0.8" />
            <!-- Base quadrada -->
            <rect x="1170" y="730" width="60" height="40" fill="#666" opacity="0.7" />
            <!-- Lacador figure -->
            <circle cx="1200" cy="520" r="35" fill="#d4af37" opacity="0.9" />
            <!-- Lasso -->
            <path d="M 1220 520 Q 1280 480 1320 500" stroke="#d4af37" stroke-width="4" fill="none" opacity="0.8" />
            <circle cx="1320" cy="500" r="20" fill="none" stroke="#d4af37" stroke-width="3" opacity="0.8" />
        </g>

        <!-- City lights in distance -->
        <circle cx="400" cy="600" r="3" fill="#ffeb3b" class="stars" opacity="0.6" />
        <circle cx="500" cy="580" r="2.5" fill="#ffc107" class="stars" opacity="0.7" />
        <circle cx="600" cy="610" r="2" fill="#ff9800" class="stars" opacity="0.5" />
        <circle cx="1100" cy="590" r="3" fill="#ffeb3b" class="stars" opacity="0.6" />
        <circle cx="1250" cy="620" r="2.5" fill="#ffc107" class="stars" opacity="0.7" />
        <circle cx="1350" cy="600" r="2" fill="#ff9800" class="stars" opacity="0.5" />

        <!-- Reflection text -->
        <text x="800" y="900" text-anchor="middle" fill="rgba(255, 255, 255, 0.1)" font-size="48" font-weight="bold">
            Porto Alegre 🍷
        </text>
    </svg>

    <div class="card">
        <h1>🍷 Bem-Vindos</h1>
        <p>Descubra os melhores lugares de Porto Alegre</p>
    </div>
</body>
</html>
